services:
  ffnet-real-time-semantic-segmentation-on-qualcomm-hexagon:
    image: harbor.edgesync.cloud/nycu-cosmos-lab/ffnet-real-time-semantic-segmentation-on-qualcomm-hexagon:v1
    container_name: ffnet-real-time-semantic-segmentation-on-qualcomm-hexagon
    hostname: ffnet-real-time-semantic-segmentation-on-qualcomm-hexagon
    privileged: false
    stdin_open: true
    tty: true
    restart: unless-stopped

    environment:
      - XDG_RUNTIME_DIR=/dev/socket/weston
      - WAYLAND_DISPLAY=wayland-1
    devices:
      - /dev/dri/card0
      - /dev/dri/renderD128
      - /dev/kgsl-3d0
      - /dev/dma_heap/system
      - /dev/fastrpc-cdsp
      - /dev/fastrpc-cdsp-secure
      - /dev/fastrpc-adsp-secure
      - /dev/video32
      - /dev/video33
      - /dev/video0
      - /dev/video1
      # - /dev/video2
      # - /dev/video3

    volumes:
      # --- Adreno GPU / OpenCL ---
      - /usr/lib/libCB.so:/usr/lib/libCB.so
      - /usr/lib/libOpenCL.so:/usr/lib/libOpenCL.so
      - /usr/lib/libOpenCL_adreno.so:/usr/lib/libOpenCL_adreno.so
      - /usr/lib/libadreno_utils.so:/usr/lib/libadreno_utils.so
      - /usr/lib/libgsl.so:/usr/lib/libgsl.so
      - /usr/lib/libllvm-qcom.so:/usr/lib/libllvm-qcom.so
      # --- Hexagon NPU / RPC ---
      - /usr/lib/libadsprpc.so:/usr/lib/libadsprpc.so
      - /usr/lib/libcdsprpc.so:/usr/lib/libcdsprpc.so
      - /usr/lib/dsp/:/usr/lib/dsp/
      # --- Qualcomm DMA Buffer ---
      - /usr/lib/libdmabufheap.so.0:/usr/lib/libdmabufheap.so.0
      - /usr/lib/libvmmem.so.0:/usr/lib/libvmmem.so.0
      - /usr/lib/libpropertyvault.so.0:/usr/lib/libpropertyvault.so.0
      # --- Weston / X11 ---
      - /etc/xdg/weston:/etc/xdg/weston
      - /usr/share/X11:/usr/share/X11
      - /dev/socket/weston:/dev/socket/weston
      # --- User Data ---
      - ./:/workspace/